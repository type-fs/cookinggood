<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com wss://*.firebaseio.com http://localhost:* ws://localhost:*" />
  <title>Kochabend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="loading-logo">Koch<em>abend</em></div>
</div>

<!-- Login -->
<div id="login-screen" style="display:none">
  <div class="login-screen">
    <div class="login-card">
      <div class="logo">Koch<em>abend</em></div>
      <div class="tagline">Every week, something delicious.<br>Sign in to join your group.</div>
      <button class="google-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </div>
</div>

<!-- Add / Edit Event modal -->
<div class="modal-overlay hidden" id="add-event-modal">
  <div class="modal">
    <h2 id="event-modal-title">Add Event</h2>
    <p>Pick a date for the next cooking evening.</p>
    <div class="form-group"><label>Date</label><input type="date" id="new-event-date" /></div>
    <div class="mt-16 gap-8">
      <button class="btn btn-primary" id="event-modal-submit">Add Event</button>
      <button class="btn btn-secondary" id="event-modal-cancel" style="margin-left:8px">Cancel</button>
    </div>
  </div>
</div>

<!-- Suggest / Edit Dish modal -->
<div class="modal-overlay hidden" id="suggest-dish-modal">
  <div class="modal">
    <h2 id="dish-modal-title">Suggest a Dish</h2>
    <p>Propose something delicious for the group.</p>
    <div class="form-group"><label>Dish name</label><input type="text" id="new-dish-name" placeholder="e.g. Pasta e Fagioli" /></div>
    <div class="form-group"><label>Recipe link (optional)</label><input type="url" id="new-dish-url" placeholder="https://…" /></div>
    <div class="form-group"><label>Ingredients (optional)</label><textarea id="new-dish-ingredients" placeholder="List ingredients…" style="min-height:60px"></textarea></div>
    <div class="form-group"><label>Recipe text (optional)</label><textarea id="new-dish-text" placeholder="Steps, notes…"></textarea></div>
    <div class="mt-16 gap-8">
      <button class="btn btn-primary" id="dish-modal-submit">Suggest Dish</button>
      <button class="btn btn-secondary" id="dish-modal-cancel" style="margin-left:8px">Cancel</button>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="main-app" style="display:none">
  <div class="app">
    <header>
      <div class="header-title">
        <div class="eyebrow">every week, something delicious</div>
        <h1>Koch<em>abend</em></h1>
      </div>
      <div class="user-chip" title="Click to sign out">
        <img id="user-avatar" src="" alt="" />
        <div>
          <div class="user-name" id="user-display-name"></div>
          <div class="sign-out-hint">Sign out</div>
        </div>
      </div>
    </header>

    <nav>
      <button class="active" data-view="events">Events</button>
      <button data-view="dishes">Dishes</button>
    </nav>

    <div class="view active" id="view-events">
      <div id="events-content"><div class="empty"><div class="icon">📅</div><p>Loading…</p></div></div>
    </div>
    <div class="view" id="view-dishes">
      <div id="dishes-content"><div class="empty"><div class="icon">🍽️</div><p>Loading…</p></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
